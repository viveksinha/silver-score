<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <style>
    /* Dark-mode-aware: in dark UA themes the silver stays, in light themes
       the star darkens for contrast against white browser chrome. */
    .star { fill: url(#fav-silver); }
    .ring { stroke: url(#fav-silver); }
    @media (prefers-color-scheme: light) {
      .star { fill: url(#fav-ink); }
      .ring { stroke: url(#fav-ink); }
    }
  </style>
  <defs>
    <linearGradient id="fav-silver" x1="4" y1="2" x2="28" y2="30" gradientUnits="userSpaceOnUse">
      <stop stop-color="#f4f5f9"/>
      <stop offset="0.5" stop-color="#7d8496"/>
      <stop offset="1" stop-color="#dde1ea"/>
    </linearGradient>
    <linearGradient id="fav-ink" x1="4" y1="2" x2="28" y2="30" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1a1816"/>
      <stop offset="0.5" stop-color="#3f3b35"/>
      <stop offset="1" stop-color="#1a1816"/>
    </linearGradient>
  </defs>
  <circle class="ring" cx="16" cy="16" r="13" stroke-width="1.2" fill="none" opacity="0.9"/>
  <path class="star" d="M16 6.8l1.65 5.06h5.35l-4.33 3.15 1.65 5.07-4.32-3.14-4.32 3.14 1.65-5.07-4.33-3.15h5.35L16 6.8z"/>
</svg>
