name: Refresh IMDB Ratings

on:
  schedule:
    - cron: '0 6 * * 1'   # Monday 6 AM UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Scrape IMDB ratings
        env:
          IMDB_PROFILE_ID: ${{ vars.IMDB_PROFILE_ID }}
        run: python scripts/scrape_imdb.py --output scripts/scraped-ratings.json

      - name: Build data.js
        run: python scripts/build_data.py --input scripts/scraped-ratings.json --output assets/js/data.js

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/js/data.js index.html "pages/*.html" scripts/wikidata-language-cache.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: refresh ratings data $(date -u +%Y-%m-%d)"
            git push
          fi
