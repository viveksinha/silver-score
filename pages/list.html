<!DOCTYPE html>

    var k = 'silver-score-theme';
    var t = localStorage.getItem(k) || localStorage.getItem('movies-site-theme');
    if (t !== 'light' && t !== 'dark') {
      t = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
    }
    document.documentElement.setAttribute('data-theme', t);
  })();
  </script>

  <link rel="icon" href="../assets/favicon.svg" type="image/svg+xml">
  <link rel="alternate" type="application/rss+xml" title="Silver Score RSS" href="../feed.xml">
</head>
<body>

<nav aria-label="Main">

    </a>

      <svg viewBox="0 0 24 24" aria-hidden="true">
        <line class="nav-toggle__line nav-toggle__line--top" x1="4" y1="6" x2="20" y2="6"/>
        <line class="nav-toggle__line nav-toggle__line--mid" x1="4" y1="12" x2="20" y2="12"/>
        <line class="nav-toggle__line nav-toggle__line--bot" x1="4" y1="18" x2="20" y2="18"/>

    <div class="nav-panel" id="nav-panel" data-state="closed">
      <div class="nav-links">
        <a href="../index.html">Home</a>
        <a href="stories.html" class="active">Stories</a>

      </div>
      <button type="button" class="theme-toggle" id="theme-toggle" aria-pressed="false" aria-label="Switch theme" title="Theme">
        <svg class="icon-moon" viewBox="0 0 24 24" aria-hidden="true"><path d="M20 14.5A8 8 0 0 1 9.5 4a8 8 0 1 0 10.5 10.5Z"/></svg>
        <svg class="icon-sun" viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="4"/><line x1="12" y1="2" x2="12" y2="5"/><line x1="12" y1="19" x2="12" y2="22"/><line x1="2" y1="12" x2="5" y2="12"/><line x1="19" y1="12" x2="22" y2="12"/><line x1="4.5" y1="4.5" x2="6.6" y2="6.6"/><line x1="17.4" y1="17.4" x2="19.5" y2="19.5"/><line x1="4.5" y1="19.5" x2="6.6" y2="17.4"/><line x1="17.4" y1="6.6" x2="19.5" y2="4.5"/></svg>
        <span class="theme-toggle__label">Light</span>
      </button>

  </div>
</nav>

<main id="main">
<div class="container prose-article">
  <p class="eyebrow"><a href="stories.html#curated-lists" style="color:inherit">← All lists</a></p>
  <h1 id="list-title">List</h1>
  <p class="lead" id="list-thesis"></p>

  <div class="filter-bar" style="margin-top:1.25rem">
    <select id="language-filter" aria-label="Filter by original language">
      <option value="">All languages</option>
    </select>
    <select id="format-filter" aria-label="Filter by format">
      <option value="">All formats</option>
    </select>
    <select id="genre-filter" aria-label="Filter by genre">
      <option value="">All genres</option>
    </select>
    <select id="decade-filter" aria-label="Filter by decade">
      <option value="">All decades</option>
    </select>
    <select id="min-rating-filter" aria-label="Minimum our rating">
      <option value="">Any rating</option>
      <option value="7">7+</option>
      <option value="8">8+</option>
      <option value="9">9+</option>
      <option value="10">10 only</option>
    </select>
    <span class="filter-count" id="filter-count" aria-live="polite"></span>
  </div>

  <div class="table-scroll table-scroll--page" style="margin-top:1.5rem">
    <table class="data-table" id="list-table">
      <thead>
        <tr>
          <th data-sort-key="title" data-sort-default="asc">Title</th>
          <th data-sort-key="language" data-sort-default="asc">Original language</th>
          <th data-sort-key="year" data-sort-default="desc">Year</th>
          <th data-sort-key="type" data-sort-default="asc">Format</th>
          <th data-sort-key="myRating" data-sort-default="desc">Our rating</th>
          <th data-sort-key="imdbRating" data-sort-default="desc">IMDb</th>
          <th data-sort-key="votes" data-sort-default="desc">IMDb votes</th>
          <th>RT</th>
          <th data-sort-key="genres" data-sort-default="asc">Genres</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>
</div>
</main>

<footer>
  <div class="container">Silver Score &middot; ~8,500+ hours &middot; 1,000+ titles &middot; April 2026</div>
</footer>

<script src="../assets/js/theme.js"></script>
<script src="../assets/js/nav.js"></script>
<script src="../assets/js/data.js"></script>
<script src="../assets/js/table-sort.js"></script>
<script src="../assets/js/rt-link.js"></script>
<script src="../assets/js/magazine.js"></script>
<script>
(function () {
  const data = DATA;
  const S = silverScoreTableSort;
  const slug = (location.hash || '').replace(/^#/, '') || MAGAZINE.lists[0].slug;
  const meta = MAGAZINE.lists.find((l) => l.slug === slug) || MAGAZINE.lists[0];
  if (!meta) return;

  document.title = meta.title + ' — Silver Score';
  document.getElementById('list-title').textContent = meta.title;
  document.getElementById('list-thesis').textContent = meta.thesis;

  function imdbGenreUrl(g) {
    return `https://www.imdb.com/search/title/?genres=${encodeURIComponent(g.toLowerCase().replace(/ /g, '-'))}`;
  }

  function formatBadge(type) {
    if (type === 'Movie') return '<span class="format-badge film">Film</span>';
    if (type === 'TV Series') return '<span class="format-badge series">Series</span>';
    if (type === 'TV Mini Series') return '<span class="format-badge mini">Miniseries</span>';
    return '<span class="format-badge">' + (type || '—') + '</span>';
  }

  const listRows = MAGAZINE_UTILS.rowsForList(meta, data.allItems);
  const languageEl = document.getElementById('language-filter');
  const formatEl = document.getElementById('format-filter');
  const genreEl = document.getElementById('genre-filter');
  const decadeEl = document.getElementById('decade-filter');
  const minRatingEl = document.getElementById('min-rating-filter');
  const countEl = document.getElementById('filter-count');

  S.fillLanguageFilterOptions(languageEl, listRows);

  function fillOptions(selectEl, values) {
    while (selectEl.options.length > 1) selectEl.remove(1);
    values.forEach((v) => {
      const o = document.createElement('option');
      o.value = v.value;
      o.textContent = v.label;
      selectEl.appendChild(o);
    });
  }

  const formatLabels = { Movie: 'Film', 'TV Series': 'Series', 'TV Mini Series': 'Miniseries' };
  const formatsPresent = Array.from(new Set(listRows.map((i) => i.type).filter(Boolean))).sort();
  fillOptions(
    formatEl,
    formatsPresent.map((t) => ({ value: t, label: formatLabels[t] || t })),
  );

  const genresPresent = Array.from(new Set(listRows.flatMap((i) => i.genres || []))).sort((a, b) =>
    a.localeCompare(b, undefined, { sensitivity: 'base' }),
  );
  fillOptions(
    genreEl,
    genresPresent.map((g) => ({ value: g, label: g })),
  );

  const decadesPresent = Array.from(
    new Set(listRows.map((i) => Math.floor(Number(i.year) / 10) * 10).filter((d) => !isNaN(d) && d > 0)),
  ).sort((a, b) => b - a);
  fillOptions(
    decadeEl,
    decadesPresent.map((d) => ({ value: String(d), label: d + 's' })),
  );
  function votesN(i) {
    const v = i.votes;
    if (v == null || v === '') return 0;
    return Number(v);
  }
  const tieTitle = (a, b) =>
    String(a.title || '').localeCompare(String(b.title || ''), undefined, { sensitivity: 'base', numeric: true });
  const tieVotesThenTitle = (a, b) => {
    const d = votesN(b) - votesN(a);
    if (d !== 0) return d;
    return tieTitle(a, b);
  };
  const listSort = { key: 'myRating', dir: 'desc' };
  const listSpec = {
    title: { type: 'string', val: (i) => i.title },
    language: { type: 'string', val: (i) => i.languageLabel || i.languageHint || '', tiebreak: tieTitle },
    year: { type: 'number', val: (i) => i.year, tiebreak: tieTitle },
    type: { type: 'string', val: (i) => i.type },
    myRating: { type: 'number', val: (i) => i.myRating, tiebreak: tieVotesThenTitle },
    imdbRating: { type: 'number', val: (i) => i.imdbRating, tiebreak: tieTitle },
    votes: { type: 'number', val: votesN, tiebreak: tieTitle },
    genres: { type: 'string', val: (i) => (i.genres || []).join(', '), tiebreak: tieTitle },
  };

  const listTable = document.getElementById('list-table');
  const listTbody = document.querySelector('#list-table tbody');

  function renderListTable() {
    const langF = languageEl.value;
    const fmtF = formatEl.value;
    const genreF = genreEl.value;
    const decF = decadeEl.value === '' ? null : Number(decadeEl.value);
    const minR = minRatingEl.value === '' ? null : Number(minRatingEl.value);

    const base = listRows.filter((i) => {
      if (langF === '__none__' && S.languageKey(i)) return false;
      if (langF && langF !== '__none__' && S.languageKey(i) !== langF) return false;
      if (fmtF && i.type !== fmtF) return false;
      if (genreF && !(i.genres || []).includes(genreF)) return false;
      if (decF != null) {
        const y = Number(i.year);
        if (isNaN(y) || y < decF || y >= decF + 10) return false;
      }
      if (minR != null) {
        const r = Number(i.myRating);
        if (isNaN(r)) return false;
        if (minR === 10 ? r !== 10 : r < minR) return false;
      }
      return true;
    });
    const rows = S.sortRows(base, listSort, listSpec);
    countEl.textContent = rows.length === listRows.length
      ? listRows.length + ' titles'
      : rows.length + ' of ' + listRows.length;
    listTbody.innerHTML = rows
      .map((i) => {
        const rc =
          i.myRating >= 10
            ? 'rating-10'
            : i.myRating >= 9
              ? 'rating-9'
              : i.myRating >= 8
                ? 'rating-8'
                : 'rating-7';
        const langRaw = i.languageLabel || i.languageHint;
        const lang = S.languagePillHtml(langRaw, 'Original language from IMDb when listed');
        return `<tr>
      <td><a href="${i.url}" target="_blank" rel="noopener noreferrer">${i.title}</a></td>
      <td style="font-size:0.75rem;max-width:7rem">${lang}</td>
      <td>${i.year}</td>
      <td>${formatBadge(i.type)}</td>
      <td><span class="rating-badge ${rc}">${i.myRating}</span></td>
      <td><span class="imdb-badge">${i.imdbRating}</span></td>
      <td style="font-family:var(--font-mono);font-size:0.8rem;color:var(--text-secondary)">${votesN(i).toLocaleString()}</td>
      <td class="rt-cell">${silverScoreRt.cellHtml(i)}</td>
      <td style="font-size:0.75rem;color:var(--text-secondary)">${i.genres.map((g) => `<a href="${imdbGenreUrl(g)}" target="_blank" rel="noopener noreferrer" style="color:var(--text-secondary)">${g}</a>`).join(', ')}</td>
    </tr>`;
      })
      .join('');
  }

  S.bindSortableTable(listTable, { state: listSort, spec: listSpec, onChange: renderListTable });
  [languageEl, formatEl, genreEl, decadeEl, minRatingEl].forEach((el) =>
    el.addEventListener('change', renderListTable),
  );
  renderListTable();
})();
</script>
</body>
</html>
