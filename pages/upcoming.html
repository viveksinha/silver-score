<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Silver Score — upcoming films and series matched to a thriller, noir, and prestige-drama taste profile.">
  <title>Silver Score — Upcoming</title>
  <link rel="icon" href="../assets/favicon.svg" type="image/svg+xml">
  <script>
  (function(){
    var k = 'silver-score-theme';
    var t = localStorage.getItem(k) || localStorage.getItem('movies-site-theme');
    if (t !== 'light' && t !== 'dark') {
      t = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
    }
    document.documentElement.setAttribute('data-theme', t);
  })();
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600;0,700;1,600&family=DM+Mono:ital,wght@0,300;0,400;0,500;1,400&family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Fraunces:ital,opsz,wght@0,9..144,600;0,9..144,700;0,9..144,800;1,9..144,600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/styles.css">
</head>
<body>

<nav aria-label="Main">
  <div class="container">
    <a class="logo-link" href="../index.html" aria-label="Silver Score home">
      <img src="../assets/favicon.svg" alt="" class="logo-icon" width="30" height="30" />
      <span class="logo-wordmark">Silver Score</span>
    </a>
    <div class="nav-links">
      <a href="../index.html">Home</a>
      <a href="read.html#curated-lists">Lists</a>
      <a href="hidden-gems.html">Under the Radar</a>
      <a href="upcoming.html" class="active">Upcoming</a>
      <a href="browse.html">Browse</a>
      <a href="about.html">About</a>
      <button type="button" class="theme-toggle" id="theme-toggle" aria-label="Switch theme" title="Theme">Light</button>
    </div>
  </div>
</nav>

<main>
<div class="container">
  <header class="hero">
    <span class="eyebrow">Anticipation</span>
    <h1>What we’re tracking</h1>
    <p class="hero-sub">Releases grouped on a rough timeline (exact dates when we have them; otherwise year or season). Filters narrow the shelf.</p>
  </header>

  <div class="section fade-in">
    <div class="tabs" role="tablist" aria-label="Filter upcoming releases">
      <button type="button" role="tab" class="tab-btn active" data-tab="all" aria-selected="true">All</button>
      <button type="button" role="tab" class="tab-btn" data-tab="movie" aria-selected="false">Movies</button>
      <button type="button" role="tab" class="tab-btn" data-tab="TV series" aria-selected="false">TV Series</button>
      <button type="button" role="tab" class="tab-btn" data-tab="spy" aria-selected="false">Spy</button>
      <button type="button" role="tab" class="tab-btn" data-tab="nordic" aria-selected="false">Nordic</button>
      <button type="button" role="tab" class="tab-btn" data-tab="korean" aria-selected="false">Korean</button>
      <button type="button" role="tab" class="tab-btn" data-tab="french" aria-selected="false">French</button>
      <button type="button" role="tab" class="tab-btn" data-tab="japanese" aria-selected="false">Japanese</button>
    </div>

    <div class="upcoming-grid" id="upcoming-grid"></div>
  </div>
</div>
</main>

<footer>
  <div class="container">Silver Score &middot; 933 IMDb ratings &middot; April 2026</div>
</footer>

<script src="../assets/js/theme.js"></script>
<script src="../assets/js/upcoming-data.js"></script>
<script src="../assets/js/upcoming-page.js"></script>
</body>
</html>
